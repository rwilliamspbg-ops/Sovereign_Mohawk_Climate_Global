name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Validate contract fixtures
        run: |
          python3 scripts/validate_dashboard_contract.py

      - name: Run unit test
        run: |
          python3 -m unittest -q tests/test_contract_validator.py

      - name: Start mock API and smoke endpoints
        run: |
          python3 mock_api/server.py > /tmp/climate-mock.log 2>&1 &
          MOCK_PID=$!
          trap "kill ${MOCK_PID}" EXIT
          for _ in $(seq 1 20); do
            if curl -fsS "http://localhost:8088/healthz" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS "http://localhost:8088/healthz" >/dev/null 2>&1; then
            echo "Mock API did not become ready in time"
            cat /tmp/climate-mock.log || true
            exit 1
          fi
          for endpoint in stats regions pipeline risk health; do
            curl -fsS "http://localhost:8088/api/climate/${endpoint}" >/dev/null
          done
